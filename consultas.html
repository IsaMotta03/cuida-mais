<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuida+ | Consultas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="painel">

    <aside class="barra-lateral">
        <header class="logotipo">
            <img src="assets/icons/logo.svg" alt="Logotipo Cuida+">
        </header>

        <nav class="menu-navegacao">
            <ul>
                <li>
                    <a href="visaogeral.html">
                        <img src="assets/icons/visao-geral.svg" alt="Ícone Visão Geral">
                        <span>Visão Geral</span>
                    </a>
                </li>
                <li>
                    <a href="pessoas.html">
                        <img src="assets/icons/pessoas.svg" alt="Ícone Pessoas">
                        <span>Pessoas</span>
                    </a>
                </li>
                <li>
                    <a href="medicamento.html">
                        <img src="assets/icons/medicamentos.svg" alt="Ícone Medicamentos">
                        <span>Medicamentos</span>
                    </a>
                </li>
                <li class="selecionado">
                    <a href="consultas.html">
                        <img src="assets/icons/consultas.svg" alt="Ícone Consultas">
                        <span>Consultas</span>
                    </a>
                </li>
                <li>
                    <a href="acompanhamentos.html">
                        <img src="assets/icons/acompanhamento.svg" alt="Ícone Acompanhamento">
                        <span>Acompanhamento</span>
                    </a>
                </li>
            </ul>
        </nav>

        <section class="rodape-lateral">
            <a href="#" class="botao-escuro gerenciarPlanos">
                <img src="assets/icons/gerenciar-planos.svg" alt="Ícone Gerenciar Planos">
                <span>Gerenciar Planos</span>
            </a>

            <a href="#configuracoes" class="link-configuracoes">
                <img src="assets/icons/configuracoes.svg" alt="Ícone Configurações">
                <span>Configurações</span>
            </a>

            <section class="perfil-usuario">
                <figure class="informacoes-usuario">
                    <img src="assets/images/avatar.png" alt="Foto de perfil do usuário" class="perfil">
                    <figcaption class="detalhes-usuario">
                        <span class="nome-usuario">Fulano Siclano</span>
                        <span class="email-usuario">fulano@uol.com</span>
                    </figcaption>
                </figure>
                <a href="#sair" class="botao-sair" title="Sair da conta">
                    <img src="assets/icons/logout.svg" alt="Ícone Sair" class="sair">
                </a>
            </section>
        </section>
    </aside>

    <main class="conteudo-principal">
        <header class="cabecalho-topo">
            <section class="titulos-cabecalho">
                <h1>Consultas</h1>
                <p id="contagem-consultas">0 consultas agendadas</p>
            </section>
            <button class="superior" id="btn-nova-consulta">
                <img src="assets/icons/consultas.svg" alt="Ícone Nova Consulta">
                Nova Consulta
            </button>
        </header>

        <div class="barra-mes">
            <div class="seletor-mes">
                <span class="mes-atual" id="mes-atual"></span>
                <img src="assets/icons/bola-azul.svg" alt="Dropdown mês" class="icone-dropdown">
            </div>
            <div class="navegacao-mes">
                <button class="btn-mes" id="btn-mes-anterior" aria-label="Mês anterior">&#8249;</button>
                <button class="btn-mes" id="btn-mes-proximo" aria-label="Próximo mês">&#8250;</button>
            </div>
        </div>

        <section class="area-conteudo" id="area-conteudo">
            <!-- Preenchido via JavaScript -->
        </section>
    </main>

    <!-- Modal Nova Consulta -->
    <div class="modal-overlay" id="modal-nova-consulta">
        <div class="cartao cartao-consulta">

            <div class="form-header">
                <h1>Nova Consulta</h1>
                <button class="btn-fechar" id="btn-fechar-modal">X</button>
            </div>

            <div class="formulario formulario-consulta">

                <div class="inputs col-span-full">
                    <label for="mc-especialidade">Especialidade</label>
                    <input id="mc-especialidade" type="text" placeholder="Ex: Fisioterapia" autocomplete="off">
                </div>

                <div class="inputs col-7">
                    <label for="mc-profissional">Profissional Responsável</label>
                    <input id="mc-profissional" type="text" placeholder="">
                </div>

                <div class="inputs col-5">
                    <label for="mc-hospital">Hospital / Clínica</label>
                    <input id="mc-hospital" type="text" placeholder="">
                </div>

                <div class="inputs col-7">
                    <label for="mc-endereco">Endereço</label>
                    <input id="mc-endereco" type="text" placeholder="">
                </div>

                <div class="inputs col-5">
                    <label for="mc-cep">CEP</label>
                    <input id="mc-cep" type="text" placeholder="" maxlength="9">
                </div>

                <!-- Calendário + Horário -->
                <div class="col-span-full consulta-datetime">

                    <div class="consulta-calendario-wrap">
                        <label>Selecione a data</label>
                        <div id="mc-calendario" class="calendario-inline"></div>
                    </div>

                    <div class="consulta-horario-wrap">
                        <label>Selecione o horário</label>
                        <div class="seletor-horario-drum">
                            <div class="drum-col" id="drum-hora"></div>
                            <div class="drum-col" id="drum-min"></div>
                            <div class="drum-col" id="drum-periodo"></div>
                        </div>

                        <div class="consulta-toggles">
                            <label class="toggle-label">
                                <div class="toggle-switch">
                                    <input type="checkbox" id="mc-recorrente">
                                    <span class="toggle-slider"></span>
                                </div>
                                Recorrentes
                            </label>
                            <label class="toggle-label">
                                <div class="toggle-switch">
                                    <input type="checkbox" id="mc-exame">
                                    <span class="toggle-slider"></span>
                                </div>
                                Exames
                            </label>
                        </div>
                    </div>

                </div>

                <div class="inputs col-span-full">
                    <label for="mc-obs">Observações</label>
                    <input id="mc-obs" type="text" placeholder="Ex: Dores na lombar">
                </div>

            </div>

            <div class="form-footer">
                <button class="btn-confirmar" id="btn-confirmar-consulta">Confirmar</button>
            </div>

        </div>
    </div>

    <script src="consultas.js"></script>
</body>
</html>
